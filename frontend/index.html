<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parea</title>
    <style>
        :root{
            --bg-color: #ffffff;
            --text-color: #000000;
            --border-color: #e0e0e0;
            --hover-bg: #f5f5f5;
            --accent-black: #111111;
        }

        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        #bg-canvas{
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 100;
            pointer-events: none;
        }

        @keyframes slideUp{
            to { opacity: 1; transform: translateY(0);}
        }

        .stagger-1 { opacity: 0; transform: translateY(30px); animation: slideUp 1.0s cubic-bezier(0.16, 1, 0.3, 1) 0.4s forwards;}
        .stagger-2 { opacity: 0; transform: translateY(30px); animation: slideUp 1.0s cubic-bezier(0.16, 1, 0.3, 1) 1.2s forwards;}
        .stagger-3 { opacity: 0; transform: translateY(30px); animation: slideUp 1.0s cubic-bezier(0.16, 1, 0.3, 1) 2.0s forwards;}
        .stagger-4 { opacity: 0; transform: translateY(30px); animation: slideUp 1.0s cubic-bezier(0.16, 1, 0.3, 1) 2.8s forwards;}


        .cursor{
            display: inline-block;
            font-weight: bold;
            color: var(--text-color);
            animation: blink 1s step-end infinite;
        }

        @keyframes blink {
            50% {opacity: 0;}
        }

        #app-container{
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 800px;
            background: var(--bg-color);
            padding: 40px;
            border: none;
            border-radius: 16px;
            box-shadow: none;
        }

        h1{
            text-align: center;
            font-size: 2.5rem;
            letter-spacing: -2px;
            margin-top: 0;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .motto{
            text-align: center;
            color: #7f8c8d;
            font-size: 0.95rem;
            letter-spacing: 1px;
            margin-top: 0;
            margin-bottom: 30px;
            text-transform: lowercase;
            min-height: 20px;
        }

        .btn{
            background-color: var(--bg-color);
            color: var(--text-color);
            border: 2px solid var (--text-color);
            border-radius: 8px;
            padding: 12px 24px;
            cursor: pointer;
            font-size: 16px;
            font-family: inherit;
            font-weight: bold;
            transition: all 0.2s ease;
            text-transform: uppercase;
        }

        .btn:hover{
            background-color: var(--text-color);
            color: var(--bg-color);
        }

        input[type="text"]{
            padding: 12px;
            font-size: 16px;
            font-family: inherit;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            text-align: center;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus {
            border-color: var(--text-color);
        }

        #setup-screen{
            text-align: center;
            padding: 20px 0;
        }

        #setup-screen div{
            margin: 25px 0;
        }

        #editor-screen{
            display: none
        }

        .header-info{
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            font-weight: bold;
            border-bottom: 1px dashed var(--border-color);
            padding-bottom: 10px;
        }

        textarea{
            width: 100%;
            height: 55vh;
            padding: 20px;
            font-size: 16px;
            font-family: inherit;
            background-color: transparent;
            border: 2px solid var(--text-color);
            border-radius: 12px;
            resize: none;
            box-sizing: border-box;
            outline: none;
            line-height: 1.5;
        }

        textarea:focus{
            box-shadow: 0 0 0 3px rgba(0,0,0,0.05);
        }

        textarea:disabled{
            background-color: #fafafa;
            border-color: var(--border-color);
            color: #999
        }

        #toast-container{
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 200;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .toast{
            background: var(--text-color);
            color: var(--bg-color);
            padding: 15px 25px;
            border-radius: 8px;
            font-family: inherit;
            font-weight: bold;
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
            animation: slideInRight 0.3s ease forwards, fadeOut 0.3s ease 3 forwards;
        }

        @keyframes slideInRight {
            from{transform: translateX(100%); opacity: 0;}
            to{transform: translateX(0); opacity: 1;}
        }

        @keyframes fadeOut{
            to{opacity: 0; pointer-events: none;}
        }

        #import-modal{
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: rgba(255,255,255,0.9);
            z-index: 300;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>
    
    <div id="toast-container"></div>

    <div id="import-modal">
        <div style="background: var(--bg-color); border: 2px solid var(--text-color); padding: 30px; border-radius: 12px; text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.1);">
            <h3 style="margin-top: 0; font-size: 1.5rem; text-transform: uppercase;">Import Request</h3>
            <p style="font-weight: bold; margin-bottom: 25px; color: #555;">A guest wants to overwrite the document with a .txt file.</p>
            <div style="display: flex; gap: 15px; justify-content: center;">
                <button class="btn" id="approve-btn">Approve</button>
                <button class="btn" id="deny-btn">Deny</button>
            </div>
        </div>
    </div>

    <div id="app-container">
        <h1 class="stagger-1">Parea</h1>
        <p class="motto"><span id="motto-text"></span><span class="cursor">_</span></p>

        <div id="setup-screen">
            <div class="stagger-2">
                <button class="btn" id="create-room-btn">Create New Room</button>
            </div>
            <p class="stagger-3" style="color: #999; font-weight: bold;">- OR -</p>
            <div class="stagger-4">
                <input type="text" id="room-code-input" placeholder="ENTER CODE" autocomplete="off" maxlength="6">
                <button class="btn" id="join-room-btn">Join</button>
            </div>
        </div>

        <div id="editor-screen">
            <div class="header-info">
                <span id="room-display">ROOM: ----</span>
                <span id="users-display" style="color: #7f8c8d; font-size: 0.9em; padding: 0 10px;">USERS: 1</span>
                <div>
                    <input type="file" id="file-import" accept=".txt" style="display: none;">
                    <button class="btn" id="import-btn" style="padding: 6px 12px; font-size: 14px;">Import .txt</button>
                </div>
                <span id="role-display">ROLE: ----</span>
            </div>
            <textarea id="document-editor" placeholder="Awaiting connection..." disabled></textarea>
        </div>
    </div>

    <script>
        setTimeout(() => {
            const mottoStr = "think together. type together."
            const el = document.getElementById('motto-text')
            let i = 0;

            function typeWriter(){
                if (i<mottoStr.length){
                    el.innerHTML += mottoStr.charAt(i);
                    i++;
                    setTimeout(typeWriter, 50);
                }
            }
            typeWriter();
        }, 3800);

        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let width, height;

        function resizeCanvas(){
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        const charSet = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789{}[]();:<>+=-*&%$#@!/?';
        const particles = [];
        const particleCount = Math.floor((window.innerWidth * window.innerHeight) / 12000);

        const mouse = {x: -1000, y: -1000, radius: 120};

        window.addEventListener('mousemove', (e)=>{
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });

        window.addEventListener('mouseout', () =>{
            mouse.x = -1000;
            mouse.y = -1000;
        });

        class Particle{
            constructor(){
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.char = charSet[Math.floor(Math.random() * charSet.length)];
                this.size = Math.random() * 12 + 10;
                this.baseVy = -(Math.random() * 0.4 + 0.1);
                this.vy = this.baseVy;
                this.vx = 0;
            }

            update(activeForces){
                activeForces.forEach(force => {
                    const dx = this.x - force.x;
                    const dy = this.y - force.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);

                    if(dist < force.radius){
                        const power = (force.radius - dist) / force.radius;
                        this.vx += (dx / dist) * power * 1.5;
                        this.vy += (dy / dist) * power * 1.5;
                    }
                });

                this.vx *= 0.92;
                this.vy = this.vy * 0.92 + this.baseVy * 0.08;

                this.x += this.vx;
                this.y +=this.vy;

                if(this.y <-50){
                    this.y = height + 50;
                    this.x = Math.random() * width;
                    this.vx = 0;
                    this.vy = this.baseVy;
                    this.char = charSet[Math.floor(Math.random() * charSet.length)];
                }
                if (this.x < -50) this.x = width + 50;
                if(this.x > width + 50) this.x = -50;

            }

            draw(){
                ctx.font = `bold ${this.size}px monospace`; //to adjust boldness of letters
                ctx.fillStyle = `rgba(0,0,0,${particleOpacity})`; //to adjust opacity of letters

                ctx.fillText(this.char, this.x, this.y);
            }
        }

        let activeForces = [];
        let isConnected = false;
        let particleOpacity = 0.35;

        for (let i =0; i < particleCount; i++){
            particles.push(new Particle());
        }

        function animate(){
            ctx.clearRect(0,0, width, height);

            if (isConnected){
                particleOpacity -=0.01;
                if(particleOpacity < 0) particleOpacity = 0;
            }
            else{
                particleOpacity +=0.01;
                if (particleOpacity > 0.85) particleOpacity = 0.85;
            }

            activeForces = [];

            if(mouse.x > -1000){
                activeForces.push({x: mouse.x, y: mouse.y, radius: mouse.radius});
            }

            const uiElements=document.querySelectorAll('.btn, input[type="text"], textarea');
            uiElements.forEach(el =>{
                const rect = el.getBoundingClientRect();
                if(rect.width > 0){
                    activeForces.push({
                        x: rect.left + rect.width / 2,
                        y: rect.top + rect.height / 2,
                        radius: Math.max(rect.width, rect.height) / 1.2
                    });
                }
            });


            particles.forEach(p => {
                if(particleOpacity>0){
                    p.update(activeForces);
                    p.draw();
                }
            });
            requestAnimationFrame(animate);
        }
        animate();

        function showToast(message){
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerText = message;
            container.appendChild(toast);

            setTimeout(() => toast.remove(), 3500);
        }

        const importBtn = document.getElementById('import-btn');
        const fileInput = document.getElementById('file-import');
        const importModal = document.getElementById('import-modal');
        const approveBtn = document.getElementById('approve-btn');
        const denyBtn = document.getElementById('deny-btn');

        let isHostUser = false;
        let pendingImportText = "";
        let pendingGuestId = "";

        importBtn.addEventListener('click', () => fileInput.click());

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (event) => {
                const text = event.target.result;
                if (isHostUser){
                    editor.value = text;
                    ws.send(JSON.stringify({ type: "FORCE_OVERWRITE", content: text, senderId: "HOST"}));
                    showToast('📄 File imported succesfully');
                }
                else{
                    ws.send(JSON.stringify({ type: "IMPORT_REQUEST", content: text, senderId: "CLIENT"}));
                    showToast('⏳ Sent import request to the Host...');
                }
            };
            reader.readAsText(file);
            e.target.value='';
        });

        approveBtn.addEventListener('click', () => {
            importModal.style.opacity = '0';
            setTimeout(() => importModal.style.display = 'none', 300);

            editor.value = pendingImportText;
            ws.send(JSON.stringify({type: "FORCE_OVERWRITE", content: pendingImportText, senderId: "HOST"}));
            showToast('Import approved and applied.')
        });

        denyBtn.addEventListener('click', () =>{
            importModal.style.opacity = '0';
            setTimeout(() => importModal.style.display = 'none', 300);

            ws.send(JSON.stringify({ type: "IMPORT_DENIED", content: "Host rejected the import.", senderId: pendingGuestId}));
        })

        let ws = null;

        const setupScreen = document.getElementById('setup-screen');
        const editorScreen= document.getElementById('editor-screen');
        const createBtn = document.getElementById('create-room-btn');
        const joinBtn = document.getElementById('join-room-btn');
        const roomInput = document.getElementById('room-code-input');
        const editor = document.getElementById('document-editor');
        const roomDisplay = document.getElementById('room-display');
        const roleDisplay = document.getElementById('role-display');

        createBtn.addEventListener('click', async() => {
            try{
                const response = await fetch ('/api/create-room', {method: 'POST'});
                if (!response.ok) throw new Error("Server rejected request");
                const data = await response.json();
                connectToRoom(data.roomCode);
            }
            catch(error){
                showToast('SERVER ERROR: Is the Java backend even running?');
            }
        });

        joinBtn.addEventListener('click', () => {
            const code = roomInput.value.trim().toUpperCase();
            if (code.length === 6){
                connectToRoom(code);
            }
            else{
                showToast('Room code must be 6 characters');
            }
        });

        function connectToRoom(roomCode) {
            const protocol = window.location.protocol === 'https:' ? 'wss://' : 'ws://';
            const wsUrl = protocol + window.location.host + '/ws/' + roomCode;

            ws = new WebSocket(wsUrl);

            ws.onopen = () => {
                isConnected=true;

                setupScreen.style.display = 'none';
                editorScreen.style.display = 'block';
                editorScreen.classList.add('stagger-1');

                roomDisplay.innerText = 'ROOM: ' + roomCode;
                showToast('Connected to server');
            };

            ws.onmessage = (event) => {
                const msg = JSON.parse(event.data);

                switch(msg.type) {
                    case "ROOM_JOINED":
                        editor.value = msg.content;
                        editor.disabled = false;
                        editor.placeholder = "Start typing here...";
                        const isHost = (msg.senderId === "true");
                        roleDisplay.innerText = isHost ? "ROLE: HOST" : "ROLE: GUEST";
                        break;

                    case "USER_COUNT_UPDATE":
                        userDisplay.innerText = "USERS: " + msg.content;
                        break;
                    
                    case "TEXT_UPDATE":
                    case "FORCE_OVERWRITE":
                        const cursorPosition  = editor.selectionStart;
                        editor.value = msg.content;
                        editor.setSelectionRange(cursorPosition, cursorPosition);
                        break;
                    
                    case "PROMOTED_TO_HOST":
                        roleDisplay.innerText = "ROLE: HOST";
                        showToast('👑 ' + msg.content);
                        break;

                    case "IMPORT_REQUEST":
                        pendingImportText = msg.content;
                        pendingGuestId = msg.senderId;
                        importModal.style.display='flex';
                        setTimeout(() => importModal.style.opacity = '1',10);
                        break;

                    case "IMPORT_DENIED":
                        showToast( '❌ '+msg.content);
                        break;
                }
            };

            ws.onclose=(event) => {
                isConnected = false;
                editor.disabled = true;

                if (event.code === 1008){
                    showToast('Room does not exist or expired.');
                    setTimeout(() => location.reload(), 2000);
                }
                else{
                    showToast('Disconnected from the server.');
                }
            };
        }

        editor.addEventListener('input', (e) => {
            if (ws && ws.readyState === WebSocket.OPEN){
                const message = {
                    type: "TEXT_UPDATE",
                    content: e.target.value,
                    senderId: "CLIENT"
                };
                ws.send(JSON.stringify(message));
            }
        });
    </script>
</body>
</html>
